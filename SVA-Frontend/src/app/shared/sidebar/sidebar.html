<div class="flex h-full w-full flex-col p-5 text-white">
  <div class="border-b border-white/10 pb-5">
    <div class="flex items-center gap-3">
      <div class="flex h-11 w-11 items-center justify-center bg-white text-base font-bold text-sva-navy">SVA</div>
      <div>
        <p class="m-0 text-sm font-bold uppercase leading-none tracking-[0.16em]">SVA Perú</p>
        <p class="m-0 mt-1 text-[10px] uppercase tracking-[0.18em] text-white/45">Control operativo</p>
      </div>
    </div>
  </div>

  <div class="my-5 flex items-center gap-3 border border-white/10 bg-white/5 p-3">
    <div class="flex h-10 w-10 items-center justify-center bg-white/10 text-white">
      <i class="bi bi-person-workspace text-lg"></i>
    </div>
    <div class="min-w-0">
      <h6 class="m-0 truncate text-sm font-semibold text-white">{{ username }}</h6>
      <small class="text-[11px] font-semibold uppercase tracking-[0.12em] text-white/50">
        {{ myRole === 'SUPERADMINISTRADOR' ? 'Super Admin' : 'Administrador' }}
      </small>
    </div>
  </div>

  <nav class="flex flex-1 flex-col gap-1">
    <button type="button" class="group flex items-center gap-3 border-l-2 border-transparent px-3 py-3 text-left text-sm font-medium text-white/70 transition hover:bg-white/5 hover:text-white" (click)="selectTab('resumen')" [class.!border-white]="currentTab === 'resumen'" [class.bg-white/10]="currentTab === 'resumen'" [class.!text-white]="currentTab === 'resumen'" [class.font-semibold]="currentTab === 'resumen'">
      <i class="bi bi-speedometer2"></i><span>Dashboard</span>
    </button>
    <button type="button" class="group flex items-center gap-3 border-l-2 border-transparent px-3 py-3 text-left text-sm font-medium text-white/70 transition hover:bg-white/5 hover:text-white" (click)="selectTab('tareaje')" [class.!border-white]="currentTab === 'tareaje'" [class.bg-white/10]="currentTab === 'tareaje'" [class.!text-white]="currentTab === 'tareaje'" [class.font-semibold]="currentTab === 'tareaje'">
      <i class="bi bi-calendar2-check"></i><span>Asignar tareas</span>
    </button>
    <button type="button" class="group flex items-center gap-3 border-l-2 border-transparent px-3 py-3 text-left text-sm font-medium text-white/70 transition hover:bg-white/5 hover:text-white" (click)="selectTab('revision')" [class.!border-white]="currentTab === 'revision'" [class.bg-white/10]="currentTab === 'revision'" [class.!text-white]="currentTab === 'revision'" [class.font-semibold]="currentTab === 'revision'">
      <i class="bi bi-shield-check"></i><span>Auditar asistencias</span>
    </button>
    <button type="button" class="group flex items-center gap-3 border-l-2 border-transparent px-3 py-3 text-left text-sm font-medium text-white/70 transition hover:bg-white/5 hover:text-white" (click)="selectTab('trabajadores')" [class.!border-white]="currentTab === 'trabajadores'" [class.bg-white/10]="currentTab === 'trabajadores'" [class.!text-white]="currentTab === 'trabajadores'" [class.font-semibold]="currentTab === 'trabajadores'">
      <i class="bi bi-people"></i><span>Trabajadores</span>
    </button>
    <button type="button" class="group flex items-center gap-3 border-l-2 border-transparent px-3 py-3 text-left text-sm font-medium text-white/70 transition hover:bg-white/5 hover:text-white" (click)="selectTab('empresas')" [class.!border-white]="currentTab === 'empresas'" [class.bg-white/10]="currentTab === 'empresas'" [class.!text-white]="currentTab === 'empresas'" [class.font-semibold]="currentTab === 'empresas'">
      <i class="bi bi-buildings"></i><span>Clientes / empresas</span>
    </button>
  </nav>

  <div class="mt-4 border-t border-white/10 pt-4">
    <p class="text-[10px] uppercase tracking-[0.16em] text-white/35">&copy; 2026 SVA Perú</p>
  </div>
</div>
