<div class="min-h-screen bg-slate-100 text-slate-950">
  <nav class="sticky top-0 z-40 border-b border-slate-200 bg-white/90 px-4 py-3 shadow-sm backdrop-blur sm:px-6">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-sva-ink text-sm font-black text-white">SVA</div>
        <div>
          <p class="m-0 text-base font-black leading-none text-slate-950">SVA</p>
          <p class="m-0 mt-1 text-xs font-semibold uppercase tracking-wider text-slate-400">Operaciones</p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <div class="hidden items-center gap-3 rounded-full border border-slate-200 bg-slate-50 py-1 pl-1 pr-4 shadow-sm sm:flex">
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-sva-blue text-white">
            <i class="bi" [ngClass]="(userRole === 'ADMINISTRADOR' || userRole === 'SUPERADMINISTRADOR') ? 'bi-shield-lock-fill' : 'bi-person-badge-fill'"></i>
          </div>
          <div class="text-left">
            <p class="m-0 max-w-40 truncate text-sm font-bold leading-none text-slate-900">{{ username }}</p>
            <p class="m-0 mt-1 text-[10px] font-black uppercase tracking-wider text-sva-blue">{{ userRole }}</p>
          </div>
        </div>

        <button class="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-red-500 shadow-sm transition hover:bg-red-50" (click)="onLogout()" title="Cerrar sesión">
          <i class="bi bi-box-arrow-right text-lg"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="w-full">
    @if (userRole === 'ADMINISTRADOR' || userRole === 'SUPERADMINISTRADOR') {
      <app-admin-dashboard></app-admin-dashboard>
    } @else if (userRole === 'TRABAJADOR') {
      <app-worker-dashboard></app-worker-dashboard>
    } @else {
      <div class="flex min-h-[70vh] flex-col items-center justify-center text-center">
        <div class="h-10 w-10 animate-spin rounded-full border-4 border-slate-200 border-t-sva-blue"></div>
        <p class="mt-4 text-sm font-semibold text-slate-500">Validando credenciales...</p>
      </div>
    }
  </main>
</div>
