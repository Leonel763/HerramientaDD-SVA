<div class="min-h-screen bg-slate-50 lg:grid lg:grid-cols-[1.08fr_0.92fr]">
  <section class="relative hidden min-h-screen overflow-hidden lg:flex lg:items-center lg:px-16 xl:px-24">
    <img src="assets/fondo-login.jpg" alt="Operaciones SVA" class="absolute inset-0 h-full w-full object-cover">
    <div class="absolute inset-0 bg-[linear-gradient(135deg,rgba(16,32,51,0.9),rgba(21,59,92,0.82),rgba(31,111,235,0.64))]"></div>
    <div class="relative max-w-xl text-white">
      <div class="mb-8 inline-flex items-center gap-3 rounded-full border border-white/20 bg-white/10 px-4 py-2 text-sm font-semibold backdrop-blur">
        <span class="h-2 w-2 rounded-full bg-sva-gold"></span>
        Seguridad de acceso
      </div>
      <h1 class="mb-5 text-7xl font-black tracking-normal text-white">SVA</h1>
      <p class="text-2xl font-semibold leading-tight text-white/95">Actualiza tu credencial y mantén protegidas tus operaciones.</p>
      <p class="mt-6 max-w-lg text-base leading-7 text-white/75">Usa tu DNI, confirma tu contraseña actual y define una nueva clave de acceso.</p>
    </div>
  </section>

  <main class="flex min-h-screen items-center justify-center px-5 py-10 sm:px-8">
    <div class="w-full max-w-md">
      <div class="mb-8 text-center">
        <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-sva-ink text-2xl font-black text-white shadow-soft">SVA</div>
        <h2 class="text-3xl font-black tracking-normal text-slate-950">Cambiar contraseña</h2>
        <p class="mt-2 text-sm text-slate-500">Ingresa tu contraseña actual y la nueva</p>
      </div>

      <form class="rounded-2xl border border-slate-200 bg-white p-6 shadow-soft sm:p-8" (ngSubmit)="onSubmit()" autocomplete="off">
        <div class="space-y-5">
          <label class="block">
            <span class="mb-2 block text-xs font-bold uppercase tracking-wider text-slate-500">Usuario (DNI)</span>
            <div class="relative">
              <i class="bi bi-person-badge absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input type="text" class="sva-focus h-12 w-full rounded-xl border border-slate-200 bg-slate-50 pl-11 pr-4 text-sm font-semibold text-slate-900 placeholder:text-slate-400" [(ngModel)]="username" name="username" placeholder="Ingresa tu DNI" maxlength="8" inputmode="numeric" pattern="[0-9]*" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
            </div>
          </label>

          <label class="block">
            <span class="mb-2 block text-xs font-bold uppercase tracking-wider text-slate-500">Contraseña actual</span>
            <div class="relative">
              <i class="bi bi-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input [type]="showOldPassword ? 'text' : 'password'" class="sva-focus h-12 w-full rounded-xl border border-slate-200 bg-slate-50 pl-11 pr-12 text-sm font-semibold text-slate-900 placeholder:text-slate-400" [(ngModel)]="oldPassword" name="oldPassword" placeholder="••••••••" required>
              <button type="button" class="absolute right-3 top-1/2 flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100" (click)="toggleOldPasswordVisibility()" aria-label="Ver contraseña actual">
                <i [ngClass]="showOldPassword ? 'bi bi-eye-slash-fill' : 'bi bi-eye-fill'"></i>
              </button>
            </div>
          </label>

          <label class="block">
            <span class="mb-2 block text-xs font-bold uppercase tracking-wider text-slate-500">Nueva contraseña</span>
            <div class="relative">
              <i class="bi bi-shield-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input [type]="showNewPassword ? 'text' : 'password'" class="sva-focus h-12 w-full rounded-xl border border-slate-200 bg-slate-50 pl-11 pr-12 text-sm font-semibold text-slate-900 placeholder:text-slate-400" [(ngModel)]="newPassword" name="newPassword" placeholder="••••••••" required>
              <button type="button" class="absolute right-3 top-1/2 flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100" (click)="toggleNewPasswordVisibility()" aria-label="Ver nueva contraseña">
                <i [ngClass]="showNewPassword ? 'bi bi-eye-slash-fill' : 'bi bi-eye-fill'"></i>
              </button>
            </div>
          </label>
        </div>

        <button type="submit" class="sva-primary-btn mt-7 flex h-12 w-full items-center justify-center gap-2 rounded-xl text-sm font-black shadow-lg" [disabled]="isLoading">
          @if (isLoading) {
            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          }
          {{ isLoading ? 'Procesando...' : 'Actualizar contraseña' }}
        </button>

        <button type="button" class="mt-4 flex w-full items-center justify-center gap-2 rounded-xl px-4 py-3 text-sm font-bold text-slate-500 transition hover:bg-slate-50 hover:text-sva-blue" (click)="regresarLogin()" [disabled]="isLoading">
          <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
        </button>
      </form>

      <p class="mt-6 text-center text-xs text-slate-400">&copy; 2026 SVA Perú. Todos los derechos reservados.</p>
    </div>
  </main>
</div>
